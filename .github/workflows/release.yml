name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-24.04
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: windows-x64
            runner: windows-2025
          - name: windows-arm64
            runner: windows-11-arm
          - name: macos-intel
            runner: macos-15-intel
          - name: macos-arm64
            runner: macos-15
    name: verify (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo test --features logging

  publish-crates:
    name: publish (crates.io)
    runs-on: ubuntu-24.04
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Validate tag matches crate version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CRATE_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "telfhash-rs") | .version')"
          test "${TAG_VERSION}" = "${CRATE_VERSION}"
      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: github release
    runs-on: ubuntu-24.04
    needs: publish-crates
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
