name: release

on:
  workflow_dispatch:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-24.04
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: windows-x64
            runner: windows-2025
          - name: windows-arm64
            runner: windows-11-arm
          - name: macos-intel
            runner: macos-15-intel
          - name: macos-arm64
            runner: macos-15
    name: verify (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo test --features logging
